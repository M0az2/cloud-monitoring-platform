route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'webhook'
  routes:
    - match:
        severity: critical
      receiver: 'webhook'
      repeat_interval: 15m

receivers:
  - name: 'webhook'
    webhook_configs:
      - url: 'http://webhook-receiver:5001/'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
